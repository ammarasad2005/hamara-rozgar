name: Twin Cities Google Maps Scraper

on:
  schedule:
    # Run every 6 hours (e.g. at minute 0 of hour 0, 6, 12, 18)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual triggering of the workflow from the Actions tab
    inputs:
      max_run_time:
        description: 'Maximum run duration in seconds (default: 5 hours)'
        required: true
        default: '18000'
      headless:
        description: 'Run browser in headless mode (0 = visible, 1 = headless)'
        required: true
        default: '1'

permissions:
  contents: write  # Gives the runner permission to commit and push changes back to the repo

jobs:
  scrape:
    name: Execute Incremental Scrape
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository content
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas tqdm playwright-stealth
          playwright install chromium
          # Install browser dependencies for ubuntu
          sudo playwright install-deps chromium

      # 4. Check if progress exists and print current status
      - name: Print Current Progress Status
        run: |
          cd maps-scrape
          if [ -f "scraper.progress" ]; then
            echo "Found existing progress file: $(cat scraper.progress)"
          else
            echo "No progress file found. Starting fresh scraping sweep!"
          fi
          if [ -f "scraped_providers.csv" ]; then
            echo "Existing scraped_providers.csv contains $(wc -l < scraped_providers.csv) listings."
          else
            echo "No existing scraped_providers.csv yet."
          fi

      # 5. Execute the scraper script
      - name: Run Scraper Script
        env:
          HEADLESS: ${{ github.event.inputs.headless || '1' }}
          MAX_RUN_TIME: ${{ github.event.inputs.max_run_time || '18000' }}  # 5 hours
          SLOW_MO: '200'
          MIN_DELAY: '2'
          MAX_DELAY: '5'
        run: |
          cd maps-scrape
          python hamara_rozgar_scraper.py

      # 6. Commit and Push any newly scraped records back to the GitHub Repo
      - name: Commit and Push Scraped Data & Progress
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Check if there are any changes in the maps-scrape directory
          git add maps-scrape/scraped_providers.csv maps-scrape/scraper.progress maps-scrape/scraper.log || true
          
          # Only commit if there are actual diffs to commit
          if ! git diff --cached --quiet; then
            echo "New data or progress state detected. Committing changes..."
            git commit -m "chore: incremental update of scraped local businesses & progress"
            git push origin ${{ github.ref_name }}
          else
            echo "No new data scraped in this cycle. Skipping commit."
          fi
